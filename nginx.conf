# ================================================================
#  Payin — Nginx Configuration
#  Copy to: /etc/nginx/sites-available/payment
#  Then:    ln -s /etc/nginx/sites-available/payment /etc/nginx/sites-enabled/
#  Replace: yourdomain.com with your actual domain
# ================================================================

# Auth Service — port 8001
server {
    listen 8001;
    server_name yourdomain.com;
    root /var/www/payment/auth-service/public;

    index index.php;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

