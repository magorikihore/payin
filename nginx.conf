# ================================================================
#  Payin — Nginx Reverse Proxy Configuration
#  Domain: payin.co.tz
#
#  Services run via php artisan serve:
#    auth-service        → 127.0.0.1:8001
#    payment-service     → 127.0.0.1:8002
#    transaction-service → 127.0.0.1:8003
#    wallet-service      → 127.0.0.1:8004
#    settlement-service  → 127.0.0.1:8005
#
#  SSL: managed by Certbot (auto-appended after running certbot)
#  No-cache: all responses have no-store for real-time finance data
# ================================================================

# ------------------------------------------
#  Auth Service — auth.payin.co.tz → :8001
# ------------------------------------------
server {
    listen 80;
    server_name auth.payin.co.tz;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
    }
}

