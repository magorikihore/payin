# ================================================================
#  Payin — Nginx Configuration (Subdomain-based)
#  Copy to: /etc/nginx/sites-available/payment
#  Then:    ln -s /etc/nginx/sites-available/payment /etc/nginx/sites-enabled/
#
#  Replace: yourdomain.com with your actual domain
#
#  DNS Records needed (all A records pointing to your server IP):
#    auth.yourdomain.com      → YOUR_SERVER_IP
#    api.yourdomain.com       → YOUR_SERVER_IP
#    tx.yourdomain.com        → YOUR_SERVER_IP
#    wallet.yourdomain.com    → YOUR_SERVER_IP
#    settle.yourdomain.com    → YOUR_SERVER_IP
#
#  SSL (after DNS is set up):
#    sudo certbot --nginx -d api.yourdomain.com -d auth.yourdomain.com \
#         -d tx.yourdomain.com -d wallet.yourdomain.com -d settle.yourdomain.com
# ================================================================

# ------------------------------------------
#  Auth Service — auth.yourdomain.com
# ------------------------------------------
server {
    listen 80;
    server_name auth.yourdomain.com;
    root /var/www/payment/auth-service/public;

    index index.php;
    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

